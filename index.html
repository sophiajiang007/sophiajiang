<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophia Jiang</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Inter", sans-serif;
            margin: 0;
            padding: 0;
            background: #fbfbfc;
            color: #111;
            text-align: center;
            font-size: 18px;
            line-height: 1.6;
        }

        h1 {
            margin-top: 80px;
            font-size: 52px;
            font-weight: 600;
            letter-spacing: -1px;
            color: #111;
        }

        h2 {
            margin-top: 10px;
            font-weight: 500;
            font-size: 28px;
            color: #222;
        }

        h3 {
            font-weight: 500;
            font-size: 18px;
            color: #555;
            margin-top: -5px;
        }

        p {
            max-width: 720px;
            margin: 14px auto;
            line-height: 1.7;
            padding: 0 20px;
            font-size: 18px;
            color: #333;
        }

        /* 🔥 tighter layout between intro + sections */
        section {
            margin-top: 40px;
            padding: 50px 20px;
        }

        /* 🎨 “album card” feel */
        .album {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
            border-radius: 18px;

            /* soft Lemons → Roses vibe */
            background: linear-gradient(135deg, #fff7d6, #ffe6ee);

            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        iframe {
            display: block;
            margin: 24px auto;
            max-width: 720px;
            width: 100%;
        }

        a.button {
            display: inline-block;
            margin-top: 10px;
            padding: 12px 20px;
            background: #111;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        a.button:hover {
            transform: translateY(-1px);
            opacity: 0.85;
        }

        .desc {
            font-size: 18px;
            color: #333;
        }

        .note {
            font-size: 16px;
            color: #555;
            margin-top: -6px;
        }

        /* subtle divider */
        .divider {
            width: 60px;
            height: 2px;
            background: rgba(0,0,0,0.1);
            margin: 30px auto;
            border-radius: 2px;
        }

    </style>
</head>

<body>

    <h1>Sophia Jiang</h1>

    <h2>Songwriter • Producer • Musician</h2>

    <p>
        Welcome to my music portfolio!
    </p>

    <section>
        <div class="album">

            <h2>Lemons & Roses</h2>
            <h3>Demo Album</h3>

            <div class="divider"></div>

            <p class="desc">
                An album exploring growth & love through symbolism.
            </p>

            <p class="note">
                (This is an early version of a larger album idea I’m developing!)
            </p>

            <iframe style="border-radius:12px"
                src="https://open.spotify.com/embed/artist/32SN13aFvNxRNreC6t4wWb"
                height="380" frameborder="0"
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
            </iframe>

            <a class="button"
               href="https://open.spotify.com/artist/32SN13aFvNxRNreC6t4wWb"
               target="_blank">
               ▶ Listen on Spotify
            </a>

        </div>
    </section>

</body>
</html>
