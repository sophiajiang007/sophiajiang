<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophia Jiang</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: #fafafa;
            color: #111;
            text-align: center;
        }

        h1 {
            margin-top: 60px;
            font-size: 40px;
        }

        h2 {
            margin-top: 10px;
            font-weight: 500;
        }

        h3 {
            font-weight: 400;
            color: #555;
            margin-top: -10px;
        }

        p {
            max-width: 700px;
            margin: 20px auto;
            line-height: 1.6;
            padding: 0 20px;
        }

        section {
            margin-top: 60px;
            padding: 20px 0;
        }

        iframe {
            display: block;
            margin: 20px auto;
            max-width: 700px;
            width: 100%;
        }

        a.button {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 18px;
            background: black;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 14px;
        }

        a.button:hover {
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <h1>Sophia Jiang</h1>

    <h2>Songwriter • Producer • Musician</h2>

    <p>
        Welcome to my music portfolio!
    </p>

    <section>
        <h2>Lemons & Roses</h2>
        <h3>Demo Album</h3>

        <p>
            An album exploring growth & love through symbolism ~ let's enjoy the beauty of simple things.
        </p>
        
        <p style="font-size: 14px; color: #666; margin-top: -10px;">
            This is an early version of a larger album I’m developing!
        </p>
            
        <iframe style="border-radius:12px"
            src="https://open.spotify.com/embed/artist/32SN13aFvNxRNreC6t4wWb"
            height="380" frameborder="0"
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
        </iframe>

        <a class="button"
           href="https://open.spotify.com/artist/32SN13aFvNxRNreC6t4wWb"
           target="_blank">
           ▶ Listen on Spotify
        </a>
    </section>

</body>
</html>
