<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophia Jiang</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Inter", sans-serif;
            margin: 0;
            padding: 0;
            background: #fbfbfc;
            color: #111;
            text-align: center;
            font-size: 18px;
            line-height: 1.6;
        }

        h1 {
            margin-top: 80px;
            font-size: 52px;
            font-weight: 600;
            letter-spacing: -1px;
            color: #111;
        }

        h2 {
            margin-top: 10px;
            font-weight: 550;
            font-size: 22px;
            color: #222;
        }

        h3 {
            font-weight: 500;
            font-size: 18px;
            color: #444;
            margin-top: -5px;
        }

        p {
            max-width: 720px;
            margin: 22px auto;
            line-height: 1.7;
            padding: 0 20px;
            font-size: 18px;
            color: #333;
        }

        section {
            margin-top: 90px;
            padding: 30px 0;
        }

        iframe {
            display: block;
            margin: 24px auto;
            max-width: 720px;
            width: 100%;
        }

        a.button {
            display: inline-block;
            margin-top: 10px;
            padding: 12px 20px;
            background: #111;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 14px;
            transition: opacity 0.2s ease;
        }

        a.button:hover {
            opacity: 0.8;
        }

        /* 🎯 clean hierarchy system */
        .desc {
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
        }

        .note {
            font-size: 16px;   /* slightly smaller than desc */
            color: #444;       /* same “weight” as Demo Album text */
            margin-top: -8px;
        }
    </style>
</head>

<body>

    <h1>Sophia Jiang</h1>

    <h2>Songwriter • Producer • Musician</h2>

    <p>
        Welcome to my music portfolio!
    </p>

    <section>
        <h2>Lemons & Roses</h2>
        <h3>Demo Album</h3>

        <p class="desc">
            An album exploring growth & love through symbolism ~ let's enjoy the beauty of simple things.
        </p>

        <p class="note">
            (This is an early version of a larger album idea I’m developing!)
        </p>

        <iframe style="border-radius:12px"
            src="https://open.spotify.com/embed/artist/32SN13aFvNxRNreC6t4wWb"
            height="380" frameborder="0"
            allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
        </iframe>

        <a class="button"
           href="https://open.spotify.com/artist/32SN13aFvNxRNreC6t4wWb"
           target="_blank">
           ▶ Listen on Spotify
        </a>
    </section>

</body>
</html>
