<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sophia Jiang</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Sophia Jiang</h1>

    <h2>Songwriter • Producer • Musician</h2>

    <section>

        <div class="album" id="album-card">

            <h2 class="album-title">Lemons & Roses</h2>

            <h3 class="album-subtitle">Demo Album</h3>

            <div class="divider"></div>

            <iframe
                style="border-radius:12px"
                src="https://open.spotify.com/embed/artist/32SN13aFvNxRNreC6t4wWb"
                height="380"
                frameborder="0"
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
            </iframe>

            <div class="album-cta">
                Explore the Album →
            </div>

            <br>

            <a class="button"
               href="https://open.spotify.com/artist/32SN13aFvNxRNreC6t4wWb"
               target="_blank">
                ▶ Listen on Spotify
            </a>

        </div>

    </section>

    <footer>
        <p>
            <a href="https://www.instagram.com/sophiajiang007/" target="_blank">
                Instagram
            </a>

            &nbsp; • &nbsp;

            <a href="https://substack.com/@sophiajiang7" target="_blank">
                Substack
            </a>

            &nbsp; • &nbsp;

            <a href="mailto:sophiajiangmusic@gmail.com">
                Email
            </a>
        </p>
    </footer>

    <script>

        const albumCard = document.getElementById("album-card");

        albumCard.addEventListener("click", function (e) {

            if (e.target.closest("iframe")) return;

            if (e.target.closest(".button")) return;

            window.location.href = "lemons-roses.html";

        });

    </script>

</body>
</html>
